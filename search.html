<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Recipes | DishSwipe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header"></div>

    <main id="app-container">
        <!-- Search View -->
        <section class="search-section">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search by name (e.g. Pasta, Chicken)...">
                <button class="btn btn-primary" onclick="app.performSearch()">Search</button>
            </div>
            <div id="search-results" class="recipe-grid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
